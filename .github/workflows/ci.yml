name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate eval scenarios
        run: python3 evals/check_scenarios.py
      - name: Rebuild dist artifacts
        run: python3 scripts/build_bundle.py
      - name: Fail if committed dist/ is stale
        run: git diff --exit-code -- dist
