# Founder Wisdom — eval scenarios
#
# Hand-checkable behavioral expectations for SKILL.md. Every expectation here is
# traceable to a line in SKILL.md; the `rationale` names the rule it protects.
# See README.md in this directory for the schema and how to run these.

version: 1

# Invariants that apply to every scenario where should_trigger is true.
# Source: SKILL.md "How to choose which axioms to surface" and "Output style".
global_invariants:
  - "Reads 2-3 reference files, not more, unless a comprehensive scan is explicitly requested."
  - "Surfaces 3-7 axioms maximum."
  - "Uses the bolded-axiom-then-explanation format; the axiom is quotable in one sentence."
  - "Any market-dependent figure is presented with its *[bench YYYY-MM]* vintage, never as timeless."
  - "Does not hedge into 'it depends' without naming the specific dependency."

scenarios:

  # ---------------------------------------------------------------- triggering

  - id: trigger-fire-vp-sales
    prompt: "Should I fire my VP of Sales?"
    should_trigger: true
    expected_mode: direct
    expected_files:
      must_include: [references/hiring.md]
      must_not_include: [references/socratic-technique.md, references/fundraising.md]
    assertions:
      - "Skill triggers even though the prompt never asks for advice."
      - "Surfaces the fire-fast axiom and names its limit (not in anger, not on a Friday)."
      - "Does not answer from generic management priors."
    rationale: >-
      SKILL.md's description says to trigger on "should I..." framings and lists
      "hiring or firing" explicitly; hiring.md is the named home for firing axioms.

  - id: trigger-cofounder-absent
    prompt: "Is it normal that my co-founder stopped showing up to standups?"
    should_trigger: true
    expected_mode: direct
    expected_files:
      must_include: [references/cofounders-equity.md]
      must_not_include: [references/governance.md, references/startup-mechanics.md]
    assertions:
      - "Skill triggers on the 'is it normal that...' framing named in the description."
      - "Treats this as a co-founder-dynamics question, not a process/standup question."
    rationale: >-
      SKILL.md description: "Trigger even when the person doesn't explicitly ask for
      'advice' — questions framed as ... 'is it normal that...' ... are all in scope."

  - id: trigger-thinking-about-raising
    prompt: "We're thinking about raising."
    should_trigger: true
    expected_mode: direct
    expected_files:
      must_include: [references/fundraising.md]
      must_not_include: [references/startup-mechanics.md]
    assertions:
      - "Skill triggers on a bare 'we're thinking about...' with no question mark."
      - "Asks at most one short clarifying question about stage rather than a list."
    rationale: >-
      SKILL.md description names "we're thinking about..." as in scope; "How to
      stage-match" permits one short clarifying question when stage is unknown.

  - id: trigger-incumbent-pressure
    prompt: "How do I stop the incumbent from crushing us?"
    should_trigger: true
    expected_mode: direct
    expected_files:
      must_include: [references/strategy-moats.md]
      must_not_include: [references/hiring.md, references/culture.md]
    assertions:
      - "Routes to defensibility, not to sales tactics alone."
      - "Counter-positioning is a plausible lead axiom given an incumbent is named."
    rationale: >-
      SKILL.md lists "questions about moats, defensibility, competition, or
      positioning against incumbents" in the description and points them at
      strategy-moats.md.

  - id: trigger-third-party-advisor
    prompt: "I coach a founder who's stuck on whether to shut down. How should I approach our session tomorrow?"
    should_trigger: true
    expected_mode: socratic
    expected_files:
      must_include: [references/socratic-technique.md]
      must_not_include: []
    assertions:
      - "Triggers on the helping-someone-else frame."
      - "Offers questions the coach can ask, not axioms to recite at the client."
    rationale: >-
      SKILL.md: "Also useful when the person is helping someone else with
      founder-stage decisions (advisor, coach, mentor, investor)" and the first
      Socratic trigger bullet.

  # ------------------------------------------------------- trigger negatives

  - id: negative-fda-pathway
    prompt: "What's the difference between a 510(k) and a De Novo submission for our device?"
    should_trigger: false
    expected_mode: none
    expected_files:
      must_include: []
      must_not_include: [references/product.md, references/startup-mechanics.md, references/meta.md]
    assertions:
      - "No reference file is read."
      - "Answered (or declined) without founder axioms attached."
    rationale: >-
      SKILL.md "What this skill is not for": "Industry-specific operational
      knowledge (e.g., FDA approval pathways, ad-tech mechanics)."

  - id: negative-legal-drafting
    prompt: "Draft the indemnification clause for our standard employment agreement."
    should_trigger: false
    expected_mode: none
    expected_files:
      must_include: []
      must_not_include: [references/startup-mechanics.md, references/hiring.md]
    assertions:
      - "No reference file is read."
      - "Points at qualified counsel rather than producing axioms about hiring."
    rationale: >-
      SKILL.md "What this skill is not for": "Detailed legal advice (term sheets,
      employment law, IP) — defer to qualified counsel." This is drafting, not a
      decision question.

  - id: negative-boundary-mixed-regulatory
    prompt: "Should we hire a regulatory affairs VP before or after we submit our 510(k)?"
    should_trigger: true
    expected_mode: direct
    expected_files:
      must_include: [references/hiring.md]
      must_not_include: [references/product.md]
    assertions:
      - "Triggers on the executive-hire-timing decision."
      - "Does not attempt to answer the FDA-timeline half of the question from the corpus."
    rationale: >-
      Boundary case. The exec-hire timing is squarely in scope; the regulatory
      timeline is the out-of-scope half named in "What this skill is not for."
      SKILL.md does not say what to do with a mixed prompt — this scenario encodes
      the reading that in-scope halves trigger and out-of-scope halves are answered
      without the corpus. Ambiguous; flag if the maintainer disagrees.

  - id: negative-ai-adoption-enterprise
    prompt: "Our 4,000-person insurance company is rolling out AI agents in the contact center. How do we handle accountability?"
    should_trigger: false
    expected_mode: none
    expected_files:
      must_include: []
      must_not_include: [references/management-execution.md, references/hiring.md, references/sales-gtm.md]
    assertions:
      - "No reference file is read."
      - "Answered without founder axioms attached; the AI-and-work clause in the description is not read as license to fire on any enterprise AI-adoption question."
    rationale: >-
      Boundary on the description clause naming how AI changes the way a startup
      team works, sells, and hires and who stays accountable when an agent does the
      work. The description scopes the whole skill to a "startup, scale-up, or
      early-stage company decision," and "What this skill is not for" limits it to
      cross-domain founder patterns, so a 4,000-person incumbent's contact-center
      rollout is out of scope on both counts.

  - id: reassurance-still-triggers
    prompt: "We've got three LOIs and a great deck. This is going to work, right? Just tell me I'm not crazy."
    should_trigger: true
    expected_mode: direct
    expected_files:
      must_include: [references/yc-canon-product.md]
      must_not_include: [references/socratic-technique.md]
    assertions:
      - "Does NOT simply reassure."
      - "Surfaces the axiom that pushes back — politeness is not traction; LOIs are not signed contracts."
      - "Pushback is delivered as pattern, not as moralizing."
      - "customers-market.md and yc-canon.md are acceptable as secondary files."
    rationale: >-
      SKILL.md "What this skill is not for" lists "Reassurance" but the entry says
      the skill "should still surface the axiom that pushes back" — i.e. it is a
      not-for on the *output*, not a trigger negative. This scenario exists to stop
      that line being misread as "don't trigger." The mode is a judgment call:
      "tell me I'm not crazy" is a request for confirmation, not the ambivalence
      that SKILL.md names as a Socratic trigger, so this encodes direct. A
      maintainer who reads it as ambivalence would flip this to socratic.

  # ------------------------------------------------------------------ routing

  - id: routing-delegation-at-30
    prompt: "I'm CEO of a 30-person company and I'm still approving every hire and every spend. How do I delegate?"
    should_trigger: true
    expected_mode: direct
    expected_files:
      must_include: [references/management-execution.md]
      must_not_include: [references/startup-mechanics.md, references/governance.md]
    assertions:
      - "Leads with the Grove/Gil delegation canon (output equation, leverage, task-relevant maturity, give-away-your-Legos), not with the founder-mode counter-canon."
      - "Bounds any founder-mode material by the scope rule; being in the details is not offered as license to keep approving every hire and every spend."
      - "time-energy.md is acceptable as a secondary file but not as the primary one."
    rationale: >-
      SKILL.md's management-execution.md entry: "Consult for questions about
      delegation ... *(Mostly 10+ employees; below that, prefer time-energy.md and
      hiring.md.)*" 30 people is above the threshold. That same entry now names the
      founder-mode counter-canon and lists "founder mode" and "am I micromanaging"
      among its consult triggers, so this scenario also pins the boundary — the
      counter-canon is bounded by the scope rule that closes
      management-execution.md, not offered as license to approve everything.

  - id: routing-delegation-at-5
    prompt: "There are five of us and I'm doing everything. How do I start delegating?"
    should_trigger: true
    expected_mode: direct
    expected_files:
      must_include: [references/time-energy.md]
      must_not_include: [references/management-execution.md]
    assertions:
      - "Surfaces 'delegate outcomes, not tasks' and/or the first-hires framing from hiring.md."
      - "Does not reach for org-design or reorg material."
    rationale: >-
      Same SKILL.md stage note, other side of the threshold: "below that, prefer
      time-energy.md and hiring.md." Note the word is "prefer," not "never read" —
      management-execution.md in must_not_include is the strict reading of a soft
      instruction.

  - id: routing-canon-split-product-half
    prompt: "How do I know if we actually have product-market fit, or if I'm fooling myself?"
    should_trigger: true
    expected_mode: direct
    expected_files:
      must_include: [references/yc-canon-product.md]
      must_not_include: [references/yc-canon.md]
    assertions:
      - "Surfaces the product half of the canon — the 40% test, the building-is-on-fire feel of PMF, or hair-on-fire customers."
      - "product.md is acceptable as a secondary file."
      - "Does not reach for the essay half (Corp Dev, the pocket guide, momentum) as if it answered the question."
    rationale: >-
      SKILL.md splits the canon into two bullets: yc-canon.md is "the essay half"
      and yc-canon-product.md is "the product half ... Consult for pre-PMF
      questions, early-user research, and pivot decisions." This scenario pins the
      seam so the split does not silently collapse back into one file. yc-canon.md
      in must_not_include is the strict reading — it is not wrong to read, only
      wrong to read *instead*.

  - id: routing-moat-not-just-market
    prompt: "Investors keep asking what our moat is and I don't have a good answer."
    should_trigger: true
    expected_mode: direct
    expected_files:
      must_include: [references/strategy-moats.md]
      must_not_include: [references/fundraising.md]
    assertions:
      - "customers-market.md alone does not satisfy this scenario — the benefit+barrier test lives in strategy-moats.md."
      - "customers-market.md is acceptable as a secondary file."
      - "Does not treat this as a fundraising-narrative question."
    rationale: >-
      SKILL.md: "Consult [strategy-moats.md] whenever a question touches moats,
      defensibility, competition, positioning against incumbents ... or investor
      pushback on differentiation."

  - id: routing-exit-math
    prompt: "If we sell for $80M, what do I actually walk away with after two preferred rounds?"
    should_trigger: true
    expected_mode: direct
    expected_files:
      must_include: [references/capital-valuation.md]
      must_not_include: [references/finance-ops.md]
    assertions:
      - "Surfaces the liquidation waterfall and the founder dead zone."
      - "Explicitly defers the actual computation to counsel or a CFO rather than asserting a number."
    rationale: >-
      SKILL.md routes "what will I actually get at exit" to capital-valuation.md,
      and "What this skill is not for" defers specific financial recommendations.

  - id: routing-83b
    prompt: "I just got my founder stock. Do I need to file anything?"
    should_trigger: true
    expected_mode: direct
    expected_files:
      must_include: [references/startup-mechanics.md]
      must_not_include: [references/cofounders-equity.md]
    assertions:
      - "Surfaces the 83(b) election and its 30-day window."
      - "Defers the filing itself to counsel or a tax professional."
    rationale: >-
      SKILL.md's startup-mechanics.md entry names "founder stock" and "the 83(b)
      election and e-filing via Form 15620."

  - id: routing-equity-grant-canonical-home
    prompt: "A senior engineer is asking for 2% to join us. Is that too much?"
    should_trigger: true
    expected_mode: direct
    expected_files:
      must_include: [references/cofounders-equity.md]
      must_not_include: [references/fundraising.md]
    assertions:
      - "Surfaces the break-even test — a grant pays for itself only if the person raises the company's average outcome enough that the smaller slice beats the whole you held before."
      - "Names the break-even as a ceiling rather than an offer, because salary and overhead come out of the same stock."
      - "Runs the inversion rather than only restating the test in prose — the break-even grant (i−1)/i, roughly 16.7% at a 1.2x belief, is worked math that lives only in cofounders-equity.md, not in the hiring.md pointer."
      - "hiring.md and capital-valuation.md are acceptable as secondary files, but a one-line pointer from either is not a substitute for the worked test."
    rationale: >-
      SKILL.md's cofounders-equity.md entry names Paul Graham's equity equation —
      the break-even test behind any equity trade, investor or hire — and says it
      lives there in full while hiring.md and capital-valuation.md "carry pointers
      only," which is CONTRIBUTING.md's canonical-home rule. A model routing on
      the word "engineer" alone lands in hiring.md, which states the break-even
      test in prose but omits the worked math — the (i−1)/i inversion and the
      16.7% break-even that live only in the canonical home. That math is what the
      third assertion pins, and the seam is new — the equity equation had no home
      in the corpus before.

  - id: routing-chasm-not-sales-capacity
    prompt: "Our first fifteen customers love us and keep referring each other, but new deals have stalled for two quarters. Do we need a real sales team?"
    should_trigger: true
    expected_mode: direct
    expected_files:
      must_include: [references/customers-market.md]
      must_not_include: [references/hiring.md]
    assertions:
      - "Diagnoses the stall as a market-position problem — the chasm — rather than a sales-capacity problem."
      - "Names why the existing logos don't open the mainstream — a visionary is not a peer reference for a pragmatist buyer."
      - "Names scaling sales into the stall as the fatal move, rather than answering the hire-a-sales-team question on its own terms."
      - "sales-gtm.md and product.md are acceptable as secondary files."
    rationale: >-
      SKILL.md's customers-market.md entry names Moore's chasm and states the
      mechanism — early adopters cannot reference you to the mainstream, because
      pragmatists take references only from other pragmatists. The prompt's own
      framing is the misread the axiom names as fatal, so this scenario pins the
      file choice and the diagnosis together. hiring.md in must_not_include is
      the strict reading: hiring a sales team is the plausible wrong turn, not a
      forbidden topic.

  - id: routing-ruin-overrides-ev
    prompt: "We can bet the company on one enterprise logo that would triple revenue, but if it churns we don't survive it. The expected value pencils out. Do we take it?"
    should_trigger: true
    expected_mode: direct
    expected_files:
      must_include: [references/finance-ops.md]
      must_not_include: [references/strategy-moats.md]
    assertions:
      - "Names ruin as overriding expected value — a bet you cannot survive losing is a bad bet at any EV, because the company travels one path and zero is absorbing."
      - "Does not resolve the decision on the EV calculation alone; whether you survive the miss is the binding constraint."
      - "capital-valuation.md is acceptable as a secondary file — the power-law payoff explains why the pressure to take the bet exists."
    rationale: >-
      SKILL.md's finance-ops.md entry names the ruin test that overrides expected
      value (Peters/Kelly/Taleb). The prompt is built so the EV math favors the
      bet, which is the exact trap the axiom names: a model routing on "expected
      value" or "triple revenue" toward a strategy file misses that survivability,
      not EV, is the binding constraint. strategy-moats.md in must_not_include is
      the plausible wrong turn — it reads as a bet-the-company strategy question —
      not a forbidden topic.

  - id: routing-ai-era-gtm
    prompt: "Everyone is telling me to replace our SDR team with AI agents. Should we?"
    should_trigger: true
    expected_mode: direct
    expected_files:
      must_include: [references/sales-gtm.md]
      must_not_include: [references/socratic-technique.md]
    assertions:
      - "Surfaces the AI-era GTM axioms — automate in order of workflow legibility, an agent inherits its teacher's ceiling, you can't automate a playbook you never wrote — rather than generic AI-adoption advice."
      - "Names the sequencing (inbound qualification first, enterprise prospecting last) instead of answering yes or no."
      - "Does not present the ten-SDRs-to-one compression as a ratio the founder should plan to hit."
      - "hiring.md is acceptable as a secondary file."
    rationale: >-
      SKILL.md's description names questions about how AI changes the way a startup
      team works, sells, and hires, and the sales-gtm.md entry names the AI-era GTM
      section. This scenario pins the routing that description clause creates and
      the sequencing discipline that separates the corpus's answer from generic
      AI-adoption advice.

  - id: routing-ai-accountability
    prompt: "Our coding agent shipped a change that broke prod overnight. Who's actually on the hook here?"
    should_trigger: true
    expected_mode: direct
    expected_files:
      must_include: [references/management-execution.md]
      must_not_include: [references/socratic-technique.md]
    assertions:
      - "Surfaces the AI-era operating axioms — the agent can do the work but can never hold the accountability, and comprehension as the binding constraint once generation is cheap."
      - "Names a person as the owner rather than describing an incident-review process."
      - "culture.md is acceptable as a secondary file for the blameless-retro material."
    rationale: >-
      SKILL.md's description names who stays accountable when an agent does the
      work, and the management-execution.md entry names the AI-era operating section
      and "who owns the outcome when an agent did the work" among its consult
      triggers. That section is the largest new body of material in this batch and
      nothing else pins its routing.

  - id: routing-founder-mode
    prompt: "Everyone tells me to hire good people and get out of their way, but the company slows down every time I do. Am I micromanaging?"
    should_trigger: true
    expected_mode: direct
    expected_files:
      must_include: [references/management-execution.md]
      must_not_include: [references/governance.md]
    assertions:
      - "Surfaces the founder-mode counter-canon (being in the details is not micromanagement, the empowerment trap), not only the Grove delegation canon."
      - "Names the scope rule separating the two canons rather than presenting them as contradictory."
      - "hiring.md is acceptable as a secondary file."
    rationale: >-
      SKILL.md's management-execution.md entry names the founder-mode counter-canon
      and lists "founder mode" and "am I micromanaging" among its consult triggers.
      The file carries the Grove canon, the counter-canon, and the closing axiom that
      reconciles them, so the answer has to reach the counter-canon rather than
      stopping at hire-and-empower.

  # ----------------------------------------------------------- mode selection

  - id: mode-socratic-coach
    prompt: "One of my clients is convinced she needs to raise a Series A right now. I think she's running from a product problem. What do I ask her?"
    should_trigger: true
    expected_mode: socratic
    expected_files:
      must_include: [references/socratic-technique.md]
      must_not_include: []
    assertions:
      - "Asks or supplies one question at a time; does not stack three questions in one message."
      - "Builds context before firing the hard question (sequencing)."
      - "Does not hand over a list of fundraising axioms to recite."
    rationale: >-
      SKILL.md Socratic triggers (helping someone else) plus "ask one question at a
      time, wait for the answer" and "Whenever Socratic mode is active, read
      references/socratic-technique.md."

  - id: mode-direct-factual
    prompt: "What's a typical option pool size at seed?"
    should_trigger: true
    expected_mode: direct
    expected_files:
      must_include: [references/capital-valuation.md]
      must_not_include: [references/socratic-technique.md]
    assertions:
      - "Answers the question rather than asking one back."
      - "The pool percentage carries a *[bench YYYY-MM]* vintage."
      - "Names the pre-money option pool trap as the mechanic behind the number (startup-mechanics.md is an acceptable secondary file)."
    rationale: >-
      SKILL.md: "direct mode by default... Most uses will be direct." A factual ask
      has none of the four Socratic triggers. Note that SKILL.md's fundraising.md
      entry does not mention option pools — the pool material lives in
      capital-valuation.md ("compounding dilution and option pool refreshes") and
      startup-mechanics.md ("the pre-money option pool trap"). A model routing on
      the word "seed" alone would land in the wrong file; that is what this scenario
      catches. Vintage per "Output style."

  - id: mode-socratic-ambivalence
    prompt: "I keep going back and forth on whether to shut this down. Some weeks I'm sure, some weeks I'm not. I don't know what I'm even asking."
    should_trigger: true
    expected_mode: socratic
    expected_files:
      must_include: [references/socratic-technique.md]
      must_not_include: []
    assertions:
      - "Helps the person articulate what's actually happening before dispensing any axiom (the Harris meta-axiom)."
      - "One question, then waits."
    rationale: >-
      SKILL.md Socratic trigger: "the conversation has the texture of someone working
      through ambivalence rather than seeking information," reinforced by the Harris
      meta-axiom paragraph.

  # -------------------------------------------------------- output discipline

  - id: output-no-dump
    prompt: "We just closed our seed. What should I be thinking about for the next year?"
    should_trigger: true
    expected_mode: direct
    expected_files:
      must_include: []
      must_not_include: []
    assertions:
      - "Returns 3-7 axioms, not a domain-by-domain survey."
      - "Reads no more than 3 reference files despite the prompt's breadth."
      - "Axioms are seed-stage matched (first hires, PMF, momentum), not Series C org design."
    rationale: >-
      SKILL.md: "Pull 3-7 axioms maximum per response" and "read 2-3 files. Don't
      read more than that unless explicitly asked for a comprehensive scan." A broad
      prompt is not an explicit request for a comprehensive scan.

  - id: output-vintage-tag
    prompt: "Our burn multiple is 2.4. Is that bad?"
    should_trigger: true
    expected_mode: direct
    expected_files:
      must_include: [references/finance-ops.md]
      must_not_include: [references/capital-valuation.md]
    assertions:
      - "Cites the burn-multiple ladder with its *[bench YYYY-MM]* vintage."
      - "States the structure with conviction and the number with its date."
      - "Does not present the threshold as a timeless law."
    rationale: >-
      SKILL.md "Output style": "Cite the structure with conviction and the number
      with its vintage... Never present a dated threshold as timeless."

  - id: output-stage-match-late
    prompt: "We're 250 people and hiring our first CHRO. What should I know?"
    should_trigger: true
    expected_mode: direct
    expected_files:
      must_include: [references/hiring.md]
      must_not_include: [references/cofounders-equity.md]
    assertions:
      - "Names that the first People hire is normally 30-50 people, so this one is very late, and says what that implies."
      - "Does not surface Seed-tagged material (first ten hires set the ceiling, be stingy with equity) as if it were the live question."
      - "management-execution.md is acceptable as a secondary file."
    rationale: >-
      SKILL.md "How to stage-match": 200+ is "Org design, succession,
      professionalization, IPO-readiness," and axioms tagged for a stage should be
      preferred. Finding: the corpus is thin on 200+ hiring axioms — hiring.md's
      stage tags are all Seed-Series A — so the strongest available move is the
      first-HR-hire timing axiom read against the stage. Not a SKILL.md defect, but
      a coverage gap worth noting.

  - id: output-attribution-not-invented
    prompt: "Who said 'do things that don't scale' and what did they mean?"
    should_trigger: true
    expected_mode: direct
    expected_files:
      must_include: [references/yc-canon.md]
      must_not_include: [references/meta.md]
    assertions:
      - "Attributes to Paul Graham."
      - "Does not fabricate a quote or a source for any adjacent axiom it surfaces."
    rationale: >-
      SKILL.md "Output style": "Attribute when relevant... adds credibility and lets
      the person trace the source." CONTRIBUTING.md forbids invented attributions.
